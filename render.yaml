services:
  - type: web
    name: phaeton-tp-app
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run load && npm run seed:users
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        value: file:./prisma/dev.db
      - key: JWT_SECRET
        generateValue: true
      - key: DEMO_PASSWORD
        value: "123456"
